<svg xmlns="http://www.w3.org/2000/svg" width="880" height="414" viewBox="0 0 880 414" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" role="img" aria-labelledby="t d">
<title id="t">Platform support</title><desc id="d">16 prebuilt native targets. CI-tested: Linux x64 gnu and musl, Linux arm64 gnu and musl, Linux armv7 gnu, Windows x64, arm64 and x32, macOS x64 and arm64, FreeBSD x64. Non-blocking: Linux ppc64le and s390x. Built but untested: Linux riscv64, Android arm64 and armv7.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
<stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#10151c"/>
</linearGradient></defs>
<rect x="0.75" y="0.75" width="878.5" height="412.5" rx="14" fill="url(#bg)" stroke="#30363d"/>
<text x="32" y="44" font-size="15" font-weight="600" fill="#e6edf3">Platforms</text>
<circle cx="45" cy="94" r="12.5" fill="none" stroke="#3fb950" stroke-width="2"/><path d="M39.4 94.2 l3.9 4.0 l7.3 -8.2" fill="none" stroke="#3fb950" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
<text x="72" y="103" font-size="24" font-weight="700" fill="#e6edf3">16 native targets, prebuilt</text>
<text x="72" y="127" font-size="13" fill="#8b949e">No node-gyp, no toolchain, no postinstall step.</text>
